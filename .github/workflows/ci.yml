name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: kitchenedge
          POSTGRES_PASSWORD: kitchenedge
          POSTGRES_DB: kitchenedge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U kitchenedge -d kitchenedge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://kitchenedge:kitchenedge@localhost:5432/kitchenedge?schema=public
      PORT: '4000'
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: test
      JWT_SECRET: ci-test-jwt-secret
      SHIPPING_FREE_THRESHOLD: '4000'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - run: npx prisma migrate deploy

      - run: npm run prisma:seed

      - run: npm run lint

      - run: npm run build

      - run: npm run test:e2e
