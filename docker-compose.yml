services:
  postgres:
    image: postgres:16-alpine
    container_name: kitchenedge-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: kitchenedge
      POSTGRES_PASSWORD: kitchenedge
      POSTGRES_DB: kitchenedge
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U kitchenedge -d kitchenedge']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
